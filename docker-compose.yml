# Docker Compose для VPN-бота
# Запуск: docker compose up -d
# Просмотр логов: docker compose logs -f bot
# Остановка: docker compose down

version: '3.8'

services:
  # SSL Initialization - runs once to obtain certificates
  init-ssl:
    image: certbot/certbot
    container_name: vpn_init_ssl
    volumes:
      - ./ssl:/etc/letsencrypt
      - ./ssl/webroot:/var/www/certbot
    entrypoint: >
      /bin/sh -c '
        if [ ! -f /etc/letsencrypt/live/${DOMAIN:-localhost}/fullchain.pem ]; then
          echo "No cert found, skipping certbot";
        else
          echo "Certificate exists";
        fi
      '
    profiles:
      - init
    networks:
      - vpn_network

  # VPN Bot
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vpn_bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DOMAIN=${DOMAIN:-}
    volumes:
      - ./logs:/opt/vpn_bot/logs
      - ./vpn_bot.db:/opt/vpn_bot/vpn_bot.db
      - ./ssl:/opt/vpn_bot/ssl:ro
    networks:
      - vpn_network
    depends_on:
      - nginx

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: vpn_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"  # Webhook port
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./ssl/webroot:/var/www/certbot:ro
    networks:
      - vpn_network
    depends_on:
      - bot

  # Certbot для SSL сертификатов (renewal only)
  certbot:
    image: certbot/certbot
    container_name: vpn_certbot
    volumes:
      - ./ssl:/etc/letsencrypt
      - ./ssl/webroot:/var/www/certbot
    entrypoint: >
      /bin/sh -c '
        trap exit TERM;
        while :; do
          certbot renew --webroot -w /var/www/certbot;
          sleep 12h & wait $${!};
        done
      '
    networks:
      - vpn_network

networks:
  vpn_network:
    driver: bridge

volumes:
  logs:
  db:
  ssl:
